services:
  enableai-react-proxy:
    image: nginx:stable
    stop_grace_period: 0s
    container_name: enableai-react-proxy
    ports:
      - '3000:80'
    volumes:
      - ./scripts/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - local-network
    dns:
      - 223.5.5.5
      - 8.8.8.8
      - 8.8.4.4
    dns_search: .
    extra_hosts:
      - 'host.docker.internal:host-gateway'
      - 'k8stestapi1.enableai.cn:123.249.86.191'
      - 'k8stestapi2.enableai.cn:123.249.86.191'
      - 'k8sdevtestapi1.enableai.cn:114.116.226.134'
      - 'k8spreapi.enableai.cn:123.249.86.191'
      - 'api.enableai.cn:124.71.233.83'

networks:
  local-network:
    driver: bridge
